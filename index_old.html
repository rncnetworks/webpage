<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RNC Networks | Em Construção</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #1e40af);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white;
            text-align: center;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            padding: 2rem;
            max-width: 600px;
        }

        /* Estilo para o Logo */
        .logo-container {
            margin-bottom: 2rem;
        }

        .logo-container img {
            max-width: 100%; /* Garante que o logo não ultrapasse a largura do container */
            height: auto; /* Mantém a proporção da imagem */
            max-height: 80px; /* Define uma altura máxima opcional */
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 2rem;
        }

        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3b82f6;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            display: inline-block; /* Garante o espaçamento correto */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="logo_rncnetworks.png" alt="Logotipo da RNC Networks">
        </div>

        <div class="loader"></div>
        <span class="badge">Novidades em breve</span>
        <p>Estamos preparando algo incrível para você. Nossa nova presença digital está sendo configurada.</p>
        <div style="margin-top: 20px; font-size: 0.8rem; opacity: 0.5;">
            &copy; 2026 RNC Networks. Todos os direitos reservados.
        </div>
    </div>

</body>
</html>
